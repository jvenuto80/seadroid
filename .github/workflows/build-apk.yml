name: Build Debug APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create dummy release keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/dummy-release.jks \
            -keyalg RSA -keysize 2048 -validity 1 \
            -alias dummy \
            -storepass dummypass \
            -keypass dummypass \
            -dname "CN=CI,OU=CI,O=CI,L=CI,ST=CI,C=US"
          cat > app/key.properties <<'EOF'
          keyStore=dummy-release.jks
          keyStorePassword=dummypass
          keyAlias=dummy
          keyAliasPassword=dummypass
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
